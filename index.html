<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Store</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { line-height: 1.6; }

    header {
      background: #111;
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    .hero {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: #fff;
      padding: 80px 20px;
      text-align: center;
    }

    .hero h1 { font-size: 40px; margin-bottom: 10px; }
    .hero p { margin-bottom: 20px; }

    .btn {
      display: inline-block;
      background: #fff;
      color: #333;
      padding: 10px 20px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .templates {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      font-size: 20px;
      color: #4facfe;
      margin: 10px 0;
    }

    .pricing {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .price-box {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }

    footer {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

<header>
  <h2>My Theme Store</h2>
</header>

<section class="hero">
  <h1>Premium HTML Templates</h1>
  <p>Simple. Clean. Ready to use.</p>
  <a href="/browse" class="btn">Browse Templates</a>
</section>

<section class="section" id="templates">
  <h2>Templates</h2>
  <div class="templates">

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Template">
      <h3>Business Landing</h3>
      <p class="price">$10</p>
      <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Template">
      <h3>Portfolio</h3>
      <p class="price">$8</p>
      <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Template">
      <h3>SaaS Landing</h3>
      <p class="price">$12</p>
      <a href="#" class="btn">Buy Now</a>
    </div>

  </div>
</section>

<section class="section">
  <h2>Pricing Plans</h2>
  <div class="pricing">

    <div class="price-box">
      <h3>Basic</h3>
      <p class="price">$15</p>
      <p>3 Templates</p>
    </div>

    <div class="price-box">
      <h3>Pro</h3>
      <p class="price">$30</p>
      <p>10 Templates</p>
    </div>

    <div class="price-box">
      <h3>Ultimate</h3>
      <p class="price">$50</p>
      <p>All Templates</p>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 My Theme Store</p>
</footer>

</body>
</html>
